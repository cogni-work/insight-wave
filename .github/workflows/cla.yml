name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
      || github.event_name == 'pull_request_target'
    steps:
      - name: Block spoofable claude-author identity from untrusted PR openers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
          # Trusted maintainers whose PRs may contain claude.ai cloud-session commits.
          # The `claude` GitHub user (noreply@anthropic.com) is verified for Anthropic's
          # automation account, but the email itself can be set in any local git commit,
          # so commit-author=claude alone is not a strong identity signal. This guard
          # only honors that identity when the PR opener is also a trusted maintainer.
          TRUSTED: sdh07,claude-cogni-work
        run: |
          set -euo pipefail
          DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author,commits)
          PR_OPENER=$(echo "$DATA" | jq -r '.author.login')
          HAS_CLAUDE=$(echo "$DATA" | jq -r '[.commits[].authors[].login] | any(. == "claude")')

          echo "PR opener: $PR_OPENER"
          echo "Commits include 'claude'-authored: $HAS_CLAUDE"

          if [ "$HAS_CLAUDE" = "true" ] && ! echo "$TRUSTED" | tr ',' '\n' | grep -qx "$PR_OPENER"; then
            echo "::error::PR #$PR_NUMBER contains commits attributed to the 'claude' GitHub user, but the PR opener ($PR_OPENER) is not a trusted maintainer."
            echo "::error::The claude.ai commit-author identity is spoofable (noreply@anthropic.com can be set in any local commit), so it is only honored on PRs opened by trusted maintainers ($TRUSTED)."
            exit 1
          fi

      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: "signatures.json"
          path-to-document: "https://github.com/cogni-work/insight-wave/blob/main/CLA.md"
          remote-organization-name: cogni-work
          remote-repository-name: insight-wave
          branch: "main"
          allowlist: sdh07,claude,claude-cogni-work,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/cogni-work/insight-wave/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            This is required for all contributions to insight-wave core plugins.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          lock-pullrequest-aftermerge: false
          use-dco-flag: false
