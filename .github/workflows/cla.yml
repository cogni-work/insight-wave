name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: "signatures.json"
          path-to-document: "https://github.com/cogni-work/insight-wave/blob/main/CLA.md"
          remote-organization-name: cogni-work
          remote-repository-name: insight-wave
          branch: "main"
          allowlist: sdh07,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/cogni-work/insight-wave/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

            This is required for all contributions to insight-wave core plugins.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          lock-pullrequest-aftermerge: false
          use-dco-flag: false
