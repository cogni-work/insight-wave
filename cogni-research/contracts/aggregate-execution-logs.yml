version: "0.0.0"
script:
  name: "aggregate-execution-logs.sh"
  path: "scripts/aggregate-execution-logs.sh"
  purpose: "Aggregate partition statistics and execution logs from deeper-research projects"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to research project directory"
    - name: "--output-format"
      type: "format"
      required: false
      description: "Output format: 'json' or 'markdown' (default: markdown)"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (shorthand for --output-format json)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "0.0.0"
    date: "2025-11-09"
    changes: "Initial contract generation"
    breaking: false
