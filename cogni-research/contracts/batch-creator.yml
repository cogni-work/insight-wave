version: "1.0.0"
skill:
  name: "batch-creator"
  path: "skills/batch-creator/SKILL.md"
  purpose: "Create query batches for all refined research questions through sequential processing"
  category: "query-optimization"
interface:
  input:
    - name: "PROJECT_PATH"
      type: "path"
      required: true
      description: "Absolute path to research project directory"
    - name: "LANGUAGE"
      type: "string"
      required: false
      default: "en"
      description: "ISO 639-1 language code"
  output:
    format: "json"
    schema:
      success: "boolean"
      batches_created: "integer"
      batches_failed: "integer"
      total_configs: "integer"
      avg_configs_per_batch: "float"
      execution_time_seconds: "integer"
      questions_directory: "string"
      batches_directory: "string"
  exit_codes:
    0: "Success - all batches created"
    1: "Partial success - some batches failed (<20%)"
    110: "Environment validation failed (CLAUDE_PLUGIN_ROOT)"
    112: "PROJECT_PATH validation failed"
    113: "02-refined-questions not found or empty"
    122: "Batch creation failed"
prerequisites:
  - "Phase 2 (dimension-planner) completed"
  - "02-refined-questions/data/ directory with question-*.md files"
  - ".metadata/sprint-log.json with project configuration"
entities:
  consumes:
    - type: "refined-question"
      directory: "02-refined-questions/data/"
      pattern: "question-*.md"
  produces:
    - type: "query-batch"
      directory: "03-query-batches/data/"
      pattern: "{question-id}-batch.md"
architecture:
  position: "Phase 2.5 (between dimension-planner and findings-creator)"
  execution: "Sequential - single skill invocation processes all questions"
  agent_wrapper: "agents/batch-creator.md"
changelog:
  - version: "1.0.0"
    date: "2025-12-19"
    changes: "Initial skill creation - extracted from findings-creator"
    breaking: false
