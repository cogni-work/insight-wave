version: "1.1.0"
script:
  name: "block-entity-writes.sh"
  path: "hooks/block-entity-writes.sh"
  purpose: "Block Write/Edit tool calls to entity directories, forcing create-entity.sh usage"
  category: "utilities"
interface:
  parameters:
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Allow the tool call"
    2: "Block the tool call"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.1.0"
    date: "2026-01-02"
    changes: "Initial contract generation"
    breaking: false
