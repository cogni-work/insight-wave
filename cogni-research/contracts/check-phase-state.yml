version: "1.0.0"
script:
  name: "check-phase-state.sh"
  path: "scripts/check-phase-state.sh"
  purpose: "Checks if a phase has already completed in a previous execution attempt"
  category: "state-management"
interface:
  parameters:
    - name: "--phase"
      type: "0|1|2|3|4"
      required: true
      description: "Phase number to check"
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to project directory"
    - name: "--execution-id"
      type: "id"
      required: true
      description: "Unique execution identifier"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-22"
    changes: "Initial contract generation"
    breaking: false
