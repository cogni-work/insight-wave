version: "1.0.0"
script:
  name: "check-source-exists.sh"
  path: "scripts/check-source-exists.sh"
  purpose: "Check if source with given URL already exists by scanning filesystem"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Research project directory"
    - name: "--url"
      type: "url"
      required: true
      description: "URL to search for"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Return JSON response (optional: false)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Always (detection, not validation)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-21"
    changes: "Initial contract generation"
    breaking: false
