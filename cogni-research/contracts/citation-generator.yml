version: "2.0.0"
script:
  name: "citation-generator.sh"
  path: "scripts/citation-generator.sh"
  purpose: "Generate formal APA citations linking sources to publishers using multi-strategy resolution"
  category: "citation-generation"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Absolute path to research project directory"
    - name: "--language"
      type: "string"
      required: false
      description: "Language code: en|de (optional: en)"
    - name: "--repair-mode"
      type: "string"
      required: false
      description: "Fix existing broken publisher links instead of generating new citations (optional flag)"
    - name: "--partition"
      type: "string"
      required: false
      description: "Process subset of sources (e.g., '1/4' for partition 1 of 4)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "2.0.0"
    date: "2025-11-14"
    changes: "Initial contract generation"
    breaking: false
