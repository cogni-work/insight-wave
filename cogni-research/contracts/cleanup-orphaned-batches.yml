version: "1.0.1"
script:
  name: "cleanup-orphaned-batches.sh"
  path: "scripts/cleanup-orphaned-batches.sh"
  purpose: "Remove orphaned query batch files created via Write tool fallback or with naming typos"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to the deeper-research project"
    - name: "--dry-run"
      type: "string"
      required: false
      description: "Show what would be deleted without actually deleting"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output results as JSON"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success (cleanup completed or dry-run finished)"
    1: "Missing required arguments"
    2: "Project path does not exist"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.1"
    date: "2026-01-01"
    changes: "Initial contract generation"
    breaking: false
