version: "4.0.0"
script:
  name: "create-entity.sh"
  path: "scripts/create-entity.sh"
  purpose: "Generate entity file with UUID, YAML frontmatter, deduplication (URL+name), locking, and atomic writes"
  category: "core"
implementation:
  architecture: "python-backend-with-bash-wrapper"
  backend: "python"
  backend_script: "scripts/create-entity.py"
  wrapper: "bash"
  cross_platform: true
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Project directory path"
    - name: "--entity-type"
      type: "type"
      required: false
      description: "Entity type (00-initial-question, 01-research-dimensions, etc.)"
    - name: "--data"
      type: "json"
      required: false
      description: "Entity data as JSON string or @file.json"
    - name: "--title"
      type: "title"
      required: false
      description: "Title field for YAML frontmatter"
    - name: "--deterministic"
      type: "string"
      required: false
      description: "Generate UUID from content hash (optional, for deduplication)"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output results in JSON format"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
compatibility:
  min_bash_version: "3.2"
  min_python_version: "3.8"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
  notes: "Python 3.8+ required."
changelog:
  - version: "4.0.0"
    date: "2025-12-19"
    changes: "Migrate to Python backend with bash wrapper for cross-platform support"
    breaking: false
  - version: "3.5.2"
    date: "2025-12-08"
    changes: "Initial contract generation"
    breaking: false
