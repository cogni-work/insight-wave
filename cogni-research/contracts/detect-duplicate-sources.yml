version: "1.0.0"
script:
  name: "detect-duplicate-sources.sh"
  path: "scripts/detect-duplicate-sources.sh"
  purpose: "Detect duplicate source entities by URL and generate remediation report"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Project directory containing 07-sources and 04-findings"
    - name: "--output"
      type: "file"
      required: false
      description: "Write report to file instead of stdout"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success (report generated)"
    1: "Error (validation or processing failed)"
    2: "Invalid arguments"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-21"
    changes: "Initial contract generation"
    breaking: false
