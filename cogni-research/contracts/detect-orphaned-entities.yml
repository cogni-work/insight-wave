version: "1.0.0"
script:
  name: "detect-orphaned-entities.sh"
  path: "scripts/detect-orphaned-entities.sh"
  purpose: "Detect and report orphaned/incomplete entity files not registered in entity-index.json"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to research project"
    - name: "--entity-type"
      type: "string"
      required: false
      description: "Specific entity type to check, e.g., "07-sources" (optional, checks all if omitted)"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output in JSON format (optional: human-readable)"
    - name: "--fix"
      type: "string"
      required: false
      description: "Add orphaned entities to index (optional: report only)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
    3: "File/resource not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-13"
    changes: "Initial contract generation"
    breaking: false
