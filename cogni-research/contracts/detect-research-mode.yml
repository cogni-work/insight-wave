version: "1.0.0"
script:
  name: "detect-research-mode.sh"
  path: "skills/dimension-planner/scripts/detect-research-mode.sh"
  purpose: "Extract research_type from question file frontmatter and determine execution mode"
  category: "validators"
interface:
  parameters:
    - name: "--question-file"
      type: "path"
      required: true
      description: "Absolute path to question file"
    - name: "--json"
      type: "boolean"
      required: true
      description: "Output JSON format"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-13"
    changes: "Initial contract generation"
    breaking: false
