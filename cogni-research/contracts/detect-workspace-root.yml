version: "1.0.0"
script:
  name: "detect-workspace-root.sh"
  path: "scripts/detect-workspace-root.sh"
  purpose: "Auto-detect Obsidian vault root from project path using multi-strategy detection"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Absolute filesystem path to research project"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success (both single-project and multi-project are valid)"
    1: "Validation error (project path doesn't exist)"
    2: "Invalid arguments (missing required parameters)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
