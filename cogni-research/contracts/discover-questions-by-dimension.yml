version: "1.0.0"
script:
  name: "discover-questions-by-dimension.sh"
  path: "scripts/discover-questions-by-dimension.sh"
  purpose: "Discover refined questions grouped by dimension for Phase 3 orchestration"
  category: "extractors"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Research project directory"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (, for compatibility)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error (no questions found)"
    2: "Invalid arguments"
    3: "Directory not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-11"
    changes: "Initial contract generation"
    breaking: false
