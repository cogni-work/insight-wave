version: "1.0.0"
script:
  name: "discover-research-templates.sh"
  path: "scripts/discover-research-templates.sh"
  purpose: "Parse research-types/README.md to extract template metadata and return as JSON"
  category: "extractors"
interface:
  parameters:
    - name: "--json"
      type: "boolean"
      required: true
      description: "Output results in JSON format"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success (templates discovered or fallback provided)"
    1: "Error (malformed README, parsing failure)"
    2: "Invalid arguments"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-19"
    changes: "Initial contract generation"
    breaking: false
