version: "3.0.0"
script:
  name: "extract-finding-title.sh"
  path: "scripts/extract-finding-title.sh"
  purpose: "Extract and normalize titles from finding entities with multi-strategy fallback"
  category: "extractors"
interface:
  parameters:
    - name: "--finding-file"
      type: "string"
      required: true
      description: "Path to finding entity file"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation/extraction error"
    2: "Invalid arguments"
    3: "File not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "3.0.0"
    date: "2025-11-14"
    changes: "Initial contract generation"
    breaking: false
