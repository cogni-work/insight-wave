version: "2.0.0"
script:
  name: "generate-apa-citation.sh"
  path: "scripts/generate-apa-citation.sh"
  purpose: "Generate properly formatted APA 7th edition citations with multi-language support"
  category: "formatters"
interface:
  parameters:
    - name: "--title"
      type: "string"
      required: true
      description: "Source title"
    - name: "--url"
      type: "string"
      required: true
      description: "Source URL"
    - name: "--domain"
      type: "string"
      required: true
      description: "Source domain"
    - name: "--author"
      type: "string"
      required: false
      description: "Individual author name (optional, e.g., 'Smith, J.')"
    - name: "--institution"
      type: "string"
      required: false
      description: "Institutional author name (optional, e.g., 'World Bank')"
    - name: "--year"
      type: "string"
      required: false
      description: "Publication year (optional, e.g., '2024')"
    - name: "--date"
      type: "string"
      required: false
      description: "Formatted access date (optional, required for non-author citations)"
    - name: "--language"
      type: "string"
      required: false
      description: "Language code: en|de (optional: en)"
    - name: "--doi"
      type: "string"
      required: false
      description: "DOI identifier (optional, will be normalized)"
    - name: "--pmid"
      type: "string"
      required: false
      description: "PMID identifier"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (optional flag: plain text)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    2: "Invalid arguments"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "2.0.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
