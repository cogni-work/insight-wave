version: "1.1.0"
script:
  name: "generate-portfolio-mapping.sh"
  path: "scripts/generate-portfolio-mapping.sh"
  purpose: "Generate category-to-entity mapping for portfolio project"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Portfolio research project directory"
    - name: "--output"
      type: "path"
      required: false
      description: "Output path (optionals to .metadata/portfolio-category-mapping.json)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Invalid project path"
    2: "No portfolio entities found"
    3: "Usage error"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.1.0"
    date: "2025-12-31"
    changes: "Initial contract generation"
    breaking: false
