    2: "Parameter validation error (missing --domain)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0 - Created to fix source-creator/publisher-generator ID mismatch (Issue #84)"
    date: "2026-01-04"
    changes: "Initial contract generation"
    breaking: false
