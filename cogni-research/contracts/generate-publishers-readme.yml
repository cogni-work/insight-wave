version: "1.0.0"
script:
  name: "generate-publishers-readme.sh"
  path: "scripts/generate-publishers-readme.sh"
  purpose: "Create provenance chain README with statistics and entity index for publishers"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "string"
      required: true
      description: "Absolute path to the research project directory"
    - name: "--json"
      type: "flag"
      required: false
      description: "Output results as JSON"
    - name: "--language"
      type: "string"
      required: false
      default: "en"
      description: "Project language for translations (en, de, nl, fr)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data:
        readme_path: "string"
        readme_created: "boolean"
      stats:
        publisher_count: "integer"
        individual_count: "integer"
        organization_count: "integer"
        source_refs_total: "integer"
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    2: "Invalid arguments or missing required paths"
    3: "No publisher files found"
compatibility:
  min_bash_version: "3.2"
  dependencies:
    - "jq"
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2026-01-14"
    changes: "Initial implementation following generate-query-batches-readme.sh pattern"
    breaking: false
