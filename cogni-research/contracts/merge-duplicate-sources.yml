version: "1.0.0"
script:
  name: "merge-duplicate-sources.sh"
  path: "scripts/merge-duplicate-sources.sh"
  purpose: "Merge duplicate sources by updating finding references and archiving redundants"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Project directory containing 04-findings/data/ and 07-sources/data/"
    - name: "--report"
      type: "json"
      required: true
      description: "Path to duplicate detection report JSON"
    - name: "--dry-run"
      type: "string"
      required: false
      description: "Preview changes without modifying files"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output results in JSON format"
    - name: "--no-backup"
      type: "string"
      required: false
      description: "Skip backup creation (not recommended)"
    - name: "--archive-dir"
      type: "path"
      required: false
      description: "Custom archive directory (: .archive/)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
    3: "File/resource not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-09"
    changes: "Initial contract generation"
    breaking: false
