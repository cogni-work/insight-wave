version: "2.0.0"
script:
  name: "normalize-url.sh"
  path: "scripts/normalize-url.sh"
  purpose: "Normalize URLs to canonical form for robust deduplication in deeper-research pipeline"
  category: "utilities"
implementation:
  architecture: "python-backend-with-bash-wrapper"
  backend: "python"
  backend_script: "scripts/normalize-url.py"
  wrapper: "bash"
  cross_platform: true
interface:
  parameters:
    - name: "--url"
      type: "string"
      required: true
      description: "URL to normalize"
    - name: "--strip-query"
      type: "string"
      required: false
      description: "Remove query parameters (optional: false)"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Return JSON response (optional: text mode)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    2: "Invalid arguments or URL format"
compatibility:
  min_bash_version: "3.2"
  min_python_version: "3.8"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
  notes: "Python 3.8+ required."
changelog:
  - version: "2.0.0"
    date: "2025-12-19"
    changes: "Migrate to Python backend with bash wrapper for cross-platform support"
    breaking: false
  - version: "1.0.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
