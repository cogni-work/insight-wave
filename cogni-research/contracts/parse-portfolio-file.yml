version: "1.0.0"
script:
  name: "parse-portfolio-file.sh"
  path: "scripts/parse-portfolio-file.sh"
  purpose: "Parse portfolio mapping markdown file into structured JSON for use by trends-creator"
  category: "utilities"
interface:
  parameters:
    - name: "--file"
      type: "path"
      required: true
      description: "Absolute path to portfolio mapping markdown file"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (optional flag: true)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "File not found or validation error"
    2: "Invalid arguments"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-09"
    changes: "Initial contract generation"
    breaking: false
