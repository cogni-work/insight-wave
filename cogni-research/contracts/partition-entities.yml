version: "1.1.0"
script:
  name: "partition-entities.sh"
  path: "scripts/partition-entities.sh"
  purpose: "Calculate partition slices for parallel agent execution"
  category: "utilities"
interface:
  parameters:
    - name: "--entity-dir"
      type: "path"
      required: true
      description: "Entity directory path"
    - name: "--pattern"
      type: "string"
      required: false
      description: "Glob pattern for entity files (default: '*.md')"
    - name: "--partition-index"
      type: "number"
      required: false
      description: "Partition index (required, 0-based)"
    - name: "--total-partitions"
      type: "number"
      required: false
      description: "Total number of partitions (required, must be > 0)"
    - name: "--json"
      type: "boolean"
      required: true
      description: "Output JSON format"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
    3: "Directory not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.1.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
