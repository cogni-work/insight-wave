version: "3.0.0"
script:
  name: "post-write-validate-wikilinks.sh"
  path: "hooks/post-write-validate-wikilinks.sh"
  purpose: "Validate wikilinks in newly created entity files using centralized validation script"
  category: "utilities"
interface:
  parameters:
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Validation passed or skipped (non-entity file)"
    1: "Validation failed (broken wikilinks detected)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "3.0.0"
    date: "2025-12-21"
    changes: "Initial contract generation"
    breaking: false
