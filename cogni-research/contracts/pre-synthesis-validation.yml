version: "2.0.0"
script:
  name: "pre-synthesis-validation.sh"
  path: "hooks/pre-synthesis-validation.sh"
  purpose: "Validate prerequisites before synthesis-hub agent generates final research synthesis"
  category: "utilities"
interface:
  parameters:
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "All validations passed (proceed with synthesis)"
    1: "Critical validations failed (block synthesis with detailed report)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "2.0.0"
    date: "2026-01-04"
    changes: "Initial contract generation"
    breaking: false
