version: "1.0.0"
script:
  name: "repair-hash-mismatches.sh"
  path: "scripts/repair-hash-mismatches.sh"
  purpose: "Fix wikilinks with incorrect hash values by replacing them with canonical entity IDs"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Absolute path to deeper-research project directory"
    - name: "--entity-type"
      type: "type"
      required: false
      description: "Target specific entity type (claim, source, finding, etc.)"
    - name: "--dry-run"
      type: "string"
      required: false
      description: "Preview changes without applying them"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output results in JSON format"
    - name: "--backup-dir"
      type: "path"
      required: false
      description: "Custom backup directory path (optional: project-path/.backup-TIMESTAMP)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
    3: "Project path not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-09"
    changes: "Initial contract generation"
    breaking: false
