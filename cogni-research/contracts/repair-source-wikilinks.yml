version: "1.0.0"
script:
  name: "repair-source-wikilinks.sh"
  path: "scripts/repair-source-wikilinks.sh"
  purpose: "Identify and report broken source wikilinks in claim entities"
  category: "validators"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Absolute path to deeper-research project directory"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error (no claims or sources found)"
    2: "Invalid arguments"
    3: "Project directory not found or invalid structure"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-13"
    changes: "Initial contract generation"
    breaking: false
