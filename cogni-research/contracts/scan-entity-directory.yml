version: "1.0.0"
script:
  name: "scan-entity-directory.sh"
  path: "scripts/scan-entity-directory.sh"
  purpose: "Scan entity directory and extract metadata from markdown files"
  category: "extractors"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Research project directory"
    - name: "--entity-type"
      type: "string"
      required: true
      description: "Entity type directory to scan (e.g., '07-sources')"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error"
    2: "Invalid arguments"
    3: "Directory not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
