version: "1.0.0"
script:
  name: "scan-resumption-state.sh"
  path: "scripts/scan-resumption-state.sh"
  purpose: "Scan filesystem to determine resumption state for batch processing phases"
  category: "validation"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to research project directory"
    - name: "--phase"
      type: "enum"
      required: true
      values: ["3", "7"]
      description: "Phase to scan: 3 (findings coverage) or 7 (claims coverage)"
    - name: "--json"
      type: "flag"
      required: false
      description: "Output JSON format (always on, accepted for compatibility)"
  output:
    format: "json"
    schema:
      success: "boolean"
      phase: "integer (3 or 7)"
      recommendation: "string: FULL_RUN | RESUME | COMPLETE"
      # Phase 3 specific
      total_questions: "integer (phase 3 only)"
      completed_questions: "integer (phase 3 only)"
      pending_questions: "string[] - question IDs without findings (phase 3 only)"
      completed_question_ids: "string[] - question IDs with findings (phase 3 only)"
      # Phase 7 specific
      total_findings: "integer (phase 7 only)"
      completed_findings: "integer (phase 7 only)"
      pending_finding_ids: "string[] - finding IDs without claims (phase 7 only)"
      pending_finding_paths: "string[] - full paths to pending findings (phase 7 only)"
      error: "string (if success=false)"
  exit_codes:
    0: "Success (any recommendation: FULL_RUN, RESUME, or COMPLETE)"
    1: "Error (invalid path, missing directories)"
    2: "Invalid parameters"
compatibility:
  min_bash_version: "3.2"
  dependencies:
    - "python3 (stdlib only)"
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional, for entity-schema.json resolution)"
changelog:
  - version: "1.0.0"
    date: "2026-02-27"
    changes: "Initial implementation for rate-limit resumption support"
    breaking: false
