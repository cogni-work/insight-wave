version: "2.0.0"
script:
  name: "update-index-section.sh"
  path: "scripts/update-index-section.sh"
  purpose: "Update entity-index.json section with filesystem entities"
  category: "utilities"
interface:
  parameters:
    - name: "--index-file"
      type: "path"
      required: true
      description: "Path to entity-index.json"
    - name: "--entity-type"
      type: "string"
      required: true
      description: "Entity type to update (e.g., '07-sources')"
    - name: "--entities"
      type: "json"
      required: true
      description: "JSON array of entities to write"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Update failed"
    2: "Invalid arguments"
    3: "File not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "2.0.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
