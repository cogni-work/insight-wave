version: "0.0.0"
script:
  name: "validate-finding-template.sh"
  path: "scripts/validate-finding-template.sh"
  purpose: "Validate finding entity markdown file has all mandatory fields with correct formats"
  category: "utilities"
interface:
  parameters:
    - name: "--finding-file"
      type: "path"
      required: true
      description: "Path to finding markdown file"
    - name: "--strict"
      type: "string"
      required: false
      description: "Exit 1 on any missing mandatory field (optional: false)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "0.0.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
