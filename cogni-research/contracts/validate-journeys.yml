version: "1.0.0"
script:
  name: "validate-journeys.sh"
  path: "scripts/validate-journeys.sh"
  purpose: "Validate end-to-end navigation for user journeys in deeper-research projects"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Project directory path"
    - name: "--journey"
      type: "type"
      required: true
      description: "Journey to validate: researcher, reviewer, qa, or all"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output results in JSON format"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "All journeys pass validation"
    1: "Issues found in journey validation"
    2: "Argument error (missing/invalid arguments)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-21"
    changes: "Initial contract generation"
    breaking: false
