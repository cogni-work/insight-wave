version: "1.0.0"
script:
  name: "validate-llm-finding.sh"
  path: "scripts/validate-llm-finding.sh"
  purpose: "Validate LLM-generated finding entities for schema compliance"
  category: "validation"
interface:
  parameters:
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Validation passed"
    1: "General error"
    2: "Argument error"
    122: "Validation failed"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-31"
    changes: "Initial contract generation"
    breaking: false
