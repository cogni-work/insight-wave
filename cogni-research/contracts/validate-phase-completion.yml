version: "1.0.0"
script:
  name: "validate-phase-completion.sh"
  path: "scripts/validate-phase-completion.sh"
  purpose: "Validates that a research-executor phase completed successfully before proceeding"
  category: "validation"
interface:
  parameters:
    - name: "--phase"
      type: "0|1|2|3|4"
      required: true
      description: "Phase number to validate"
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to project directory"
    - name: "--batch-id"
      type: "id"
      required: false
      description: "Batch identifier"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Phase validation passed"
    1: "Phase validation failed (incomplete)"
    2: "Invalid parameters"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-21"
    changes: "Initial contract generation"
    breaking: false
