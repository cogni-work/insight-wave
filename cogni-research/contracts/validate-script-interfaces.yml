version: "2.0.0"
script:
  name: "validate-script-interfaces.sh"
  path: "scripts/validate-script-interfaces.sh"
  purpose: "Detect interface mismatches between agents and scripts"
  category: "validators"
interface:
  parameters:
    - name: "--agents-dir"
      type: "path"
      required: false
      description: "Path to agents directory (: cogni-research/agents/)"
    - name: "--scripts-dir"
      type: "path"
      required: false
      description: "Path to single scripts directory (backward compatible)"
    - name: "--scripts-dirs"
      type: "paths"
      required: false
      description: "Comma-separated script directory paths (e.g., "path1,path2")"
    - name: "--contracts-dir"
      type: "path"
      required: false
      description: "Path to script contracts directory (REQUIRED)"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output in JSON format"
    - name: "--verbose"
      type: "string"
      required: false
      description: "Enable detailed output"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "No issues found"
    1: "Issues found"
    2: "Invalid arguments or contract parsing error"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "2.0.0"
    date: "2026-01-02"
    changes: "Initial contract generation"
    breaking: false
