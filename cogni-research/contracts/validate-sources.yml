version: "1.0.0"
script:
  name: "validate-sources.sh"
  path: "scripts/validate-sources.sh"
  purpose: "Batch validation of source entities for Phase 4.2"
  category: "validation"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to research project directory"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (: true)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Validation passed (may have warnings)"
    1: "Validation failed (critical errors)"
    2: "Invalid parameters"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-21"
    changes: "Initial contract generation"
    breaking: false
