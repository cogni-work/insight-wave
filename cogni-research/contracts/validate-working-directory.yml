version: "1.1.0"
script:
  name: "validate-working-directory.sh"
  path: "scripts/validate-working-directory.sh"
  purpose: "Validates working directory setup and CLAUDE_PLUGIN_ROOT environment variable"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Path to project directory"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Enable JSON-only output mode (optional: true)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.1.0"
    date: "2025-11-18"
    changes: "Initial contract generation"
    breaking: false
