<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Deeper Research Works</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .canvas {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            background: #FFFFFF;
            position: relative;
            border: 1px solid #E5E5E5;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Typography Classes */
        .title {
            font-size: 36px;
            font-weight: 600;
            fill: #000000;
            letter-spacing: -0.02em;
        }

        .heading {
            font-size: 24px;
            font-weight: 600;
            fill: #000000;
        }

        .body-text {
            font-size: 16px;
            font-weight: 400;
            fill: #000000;
        }

        .small-text {
            font-size: 14px;
            font-weight: 400;
            fill: #333333;
        }

        .caption {
            font-size: 14px;
            font-weight: 400;
            fill: #666666;
        }

        /* Shape Classes */
        .box {
            fill: #FFFFFF;
            stroke: #000000;
            stroke-width: 2;
        }

        .box-filled {
            fill: #E5E5E5;
            stroke: #000000;
            stroke-width: 2;
        }

        /* Arrow Classes */
        .arrow {
            stroke: #000000;
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrowhead);
        }

        /* Utility Classes */
        .text-center {
            text-anchor: middle;
        }

        .text-left {
            text-anchor: start;
        }

        .bold {
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media print {
            body {
                background: #FFFFFF;
                padding: 0;
            }
            .canvas {
                border: none;
                max-width: 100%;
                page-break-inside: avoid;
            }
        }

        @media (max-width: 1920px) {
            .title { font-size: calc(36px * 0.8); }
            .heading { font-size: calc(24px * 0.8); }
            .body-text { font-size: max(14px, calc(16px * 0.8)); }
            .small-text { font-size: 14px; }
            .caption { font-size: 14px; }
        }

        @media (max-width: 1280px) {
            .title { font-size: calc(36px * 0.6); }
            .heading { font-size: calc(24px * 0.6); }
            .body-text { font-size: 14px; }
            .small-text { font-size: 14px; }
            .caption { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="canvas">
        <svg viewBox="0 0 1920 1080" width="100%" xmlns="http://www.w3.org/2000/svg">
            <!-- Define reusable elements -->
            <defs>
                <!-- Standard arrowhead -->
                <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#000000" />
                </marker>
            </defs>

            <!-- NO TITLE IN SVG: Figure caption provides the title -->

            <!-- Phase 1: Foundation -->
            <g id="phase1">
                <!-- Box -->
                <rect x="80" y="280" width="520" height="480" class="box" rx="4" />

                <!-- Phase Number Circle -->
                <circle cx="130" cy="330" r="28" fill="#000000" />
                <text x="130" y="340" class="heading text-center" fill="#FFFFFF">1</text>

                <!-- Phase Title -->
                <text x="180" y="340" class="heading text-left bold">Foundation</text>
                <text x="130" y="375" class="body-text text-left">(Research Collection)</text>

                <!-- Bullet Points -->
                <text x="130" y="430" class="body-text text-left">• Questions broken into dimensions</text>
                <text x="130" y="480" class="body-text text-left">• Independent investigation per</text>
                <text x="145" y="505" class="body-text text-left">dimension</text>
                <text x="130" y="555" class="body-text text-left">• Findings collected with source</text>
                <text x="145" y="580" class="body-text text-left">attribution</text>
            </g>

            <!-- Arrow 1 to 2 -->
            <line x1="600" y1="520" x2="700" y2="520" class="arrow" />

            <!-- Phase 2: Structure -->
            <g id="phase2">
                <!-- Box -->
                <rect x="700" y="280" width="520" height="480" class="box" rx="4" />

                <!-- Phase Number Circle -->
                <circle cx="750" cy="330" r="28" fill="#000000" />
                <text x="750" y="340" class="heading text-center" fill="#FFFFFF">2</text>

                <!-- Phase Title -->
                <text x="800" y="340" class="heading text-left bold">Structure</text>
                <text x="750" y="375" class="body-text text-left">(Verification & Organization)</text>

                <!-- Bullet Points -->
                <text x="750" y="430" class="body-text text-left">• Claims verified and confidence-</text>
                <text x="765" y="455" class="body-text text-left">scored</text>
                <text x="750" y="505" class="body-text text-left">• Findings organized into themes</text>
                <text x="750" y="555" class="body-text text-left">• Weak claims flagged or removed</text>
            </g>

            <!-- Arrow 2 to 3 -->
            <line x1="1220" y1="520" x2="1320" y2="520" class="arrow" />

            <!-- Phase 3: Finishing -->
            <g id="phase3">
                <!-- Box -->
                <rect x="1320" y="280" width="520" height="480" class="box" rx="4" />

                <!-- Phase Number Circle -->
                <circle cx="1370" cy="330" r="28" fill="#000000" />
                <text x="1370" y="340" class="heading text-center" fill="#FFFFFF">3</text>

                <!-- Phase Title -->
                <text x="1420" y="340" class="heading text-left bold">Finishing</text>
                <text x="1370" y="375" class="body-text text-left">(Expert Review & Synthesis)</text>

                <!-- Bullet Points -->
                <text x="1370" y="430" class="body-text text-left">• Industry experts review findings</text>
                <text x="1370" y="480" class="body-text text-left">• Customers validate relevance</text>
                <text x="1370" y="530" class="body-text text-left">• Final synthesis into deliverables</text>
            </g>

        </svg>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Diagram loaded - 16:9 aspect ratio, DIN A4 compatible');
        });
    </script>
</body>
</html>
