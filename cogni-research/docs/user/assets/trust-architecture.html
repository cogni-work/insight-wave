<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Architecture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .canvas {
            width: 100%;
            max-width: 1920px;
            aspect-ratio: 16 / 9;
            background: #FFFFFF;
            position: relative;
            border: 1px solid #E5E5E5;
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Typography Classes */
        .title {
            font-size: 36px;
            font-weight: 600;
            fill: #000000;
            letter-spacing: -0.02em;
        }

        .layer-title {
            font-size: 22px;
            font-weight: 600;
            fill: #000000;
        }

        .layer-desc {
            font-size: 16px;
            font-weight: 400;
            fill: #333333;
        }

        /* Shape Classes */
        .layer-box {
            fill: #FFFFFF;
            stroke: #000000;
            stroke-width: 2;
        }

        .layer-box-light {
            fill: #F5F5F5;
            stroke: #000000;
            stroke-width: 2;
        }

        .layer-box-lighter {
            fill: #FAFAFA;
            stroke: #000000;
            stroke-width: 2;
        }

        /* Line Classes */
        .line {
            stroke: #000000;
            stroke-width: 2;
            fill: none;
        }

        /* Utility Classes */
        .text-center {
            text-anchor: middle;
        }

        .text-left {
            text-anchor: start;
        }

        .bold {
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media print {
            body {
                background: #FFFFFF;
                padding: 0;
            }
            .canvas {
                border: none;
                max-width: 100%;
                page-break-inside: avoid;
            }
        }

        @media (max-width: 1920px) {
            .title { font-size: calc(36px * 0.8); }
            .layer-title { font-size: calc(22px * 0.8); }
            .layer-desc { font-size: max(14px, calc(16px * 0.8)); }
        }

        @media (max-width: 1280px) {
            .title { font-size: calc(36px * 0.6); }
            .layer-title { font-size: calc(22px * 0.6); }
            .layer-desc { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="canvas">
        <svg viewBox="0 0 1920 1080" width="100%" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Standard arrowhead -->
                <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#000000" />
                </marker>
            </defs>

            <!-- NO TITLE IN SVG: Figure caption provides the title -->

            <!-- Layer 1: Source Layer (Bottom) -->
            <rect x="80" y="760" width="1760" height="240" class="layer-box" rx="4" />
            <text x="120" y="815" class="layer-title text-left">Layer 1: Source Layer</text>
            <text x="960" y="875" class="layer-desc text-center">Every finding links to original URL, publication, and date</text>
            <text x="960" y="910" class="layer-desc text-center">Establishing verifiable foundation for all research claims</text>

            <!-- Layer 2: Verification Layer -->
            <rect x="80" y="600" width="1760" height="144" class="layer-box-lighter" rx="4" />
            <text x="120" y="645" class="layer-title text-left">Layer 2: Verification Layer</text>
            <text x="960" y="695" class="layer-desc text-center">Claims cross-checked against multiple sources — unsupported claims flagged, not published</text>

            <!-- Layer 3: Confidence Layer -->
            <rect x="80" y="440" width="1760" height="144" class="layer-box" rx="4" />
            <text x="120" y="485" class="layer-title text-left">Layer 3: Confidence Layer</text>
            <text x="960" y="535" class="layer-desc text-center">Claims scored on: source count, authority, recency — low-confidence claims escalated for human review</text>

            <!-- Layer 4: Expert Layer -->
            <rect x="80" y="280" width="1760" height="144" class="layer-box-lighter" rx="4" />
            <text x="120" y="325" class="layer-title text-left">Layer 4: Expert Layer</text>
            <text x="960" y="375" class="layer-desc text-center">Industry specialists review findings for technical accuracy and domain validity</text>

            <!-- Layer 5: Customer Layer (Top) -->
            <rect x="80" y="120" width="1760" height="144" class="layer-box-light" rx="4" />
            <text x="120" y="165" class="layer-title text-left">Layer 5: Customer Layer</text>
            <text x="960" y="215" class="layer-desc text-center">Customer advisors validate market relevance and business applicability</text>

            <!-- Vertical flow indicator (subtle upward arrow on left side) -->
            <line x1="40" y1="880" x2="40" y2="192" class="line" marker-end="url(#arrowhead)" />
            <text x="35" y="540" class="layer-desc text-center" transform="rotate(-90 35 540)" style="font-size: 14px; fill: #666666;">Trust Building</text>

        </svg>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Trust Architecture diagram loaded - 16:9 aspect ratio, DIN A4 compatible');
        });
    </script>
</body>
</html>
