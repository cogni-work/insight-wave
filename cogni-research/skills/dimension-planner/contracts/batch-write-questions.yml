version: "1.0.1"
script:
  name: "batch-write-questions.sh"
  path: "skills/dimension-planner/scripts/batch-write-questions.sh"
  purpose: "Batch write multiple question entity files with YAML validation"
  category: "utilities"
interface:
  parameters:
    - name: "--dimension-slug"
      type: "string"
      required: true
      description: "Dimension identifier"
    - name: "--questions-json"
      type: "json"
      required: true
      description: "JSON array of question objects with metadata"
    - name: "--project-path"
      type: "path"
      required: true
      description: "Absolute path to research project"
    - name: "--output-dir"
      type: "path"
      required: false
      description: "Directory for question files (optional: 02-refined-questions/data)"
    - name: "--enable-progress-tracking"
      type: "string"
      required: false
      description: "Enable detailed progress tracking (optional: false)"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Return JSON output (optional: false)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Validation error or write failure"
    2: "Invalid arguments"
    3: "Required path not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.1"
    date: "2025-12-31"
    changes: "Initial contract generation"
    breaking: false
