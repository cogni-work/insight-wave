version: "1.0.0"
script:
  name: "validate-template-adherence.sh"
  path: "skills/evidence-synthesizer/scripts/validate-template-adherence.sh"
  purpose: "Validates synthesis documents follow expected template structure"
  category: "utilities"
interface:
  parameters:
    - name: "--project-path"
      type: "path"
      required: true
      description: "Research project directory"
    - name: "--research-type"
      type: "string"
      required: true
      description: "One of: action-oriented-radar, trend-radar, lean-canvas"
    - name: "--document-type"
      type: "string"
      required: true
      description: "One of: executive, findings, dimensions, evidence, readme"
    - name: "--document-path"
      type: "path"
      required: true
      description: "Path to synthesis document relative to project"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (optional: human-readable)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Validation passed (all required sections found)"
    1: "Validation warnings (some sections missing but non-critical)"
    2: "Invalid parameters"
    3: "Document not found"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-29"
    changes: "Initial contract generation"
    breaking: false
