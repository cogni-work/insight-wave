const scores = {};
let totalTips = 0;
const themeTipCounts = {};
const themeScoredCounts = {};

// Build chain lookup
const chainMap = {};
(MODEL_DATA.value_chains || []).forEach(vc => { chainMap[vc.chain_id] = vc; });

// Backward compatibility: if no themes, fall back to flat value_chains/paths
const themes = MODEL_DATA.themes || [{ theme_id: 'default', name: 'TIPS Paths',
  strategic_question: '', executive_sponsor_type: '',
  value_chains: (MODEL_DATA.value_chains || MODEL_DATA.paths || []).map(c => c.chain_id || c.path_id) }];

if (!MODEL_DATA.themes && (MODEL_DATA.value_chains || MODEL_DATA.paths)) {
  (MODEL_DATA.value_chains || MODEL_DATA.paths).forEach(vc => {
    chainMap[vc.chain_id || vc.path_id] = vc;
  });
}

function init() {
  const container = document.getElementById('themes');
  const seen = new Set();

  themes.forEach(theme => {
    const section = document.createElement('div');
    section.className = 'theme-section';
    section.id = `theme-${theme.theme_id}`;

    // Theme header
    const header = document.createElement('div');
    header.className = 'theme-header';
    header.innerHTML = `
      <div class="theme-name">${theme.name}</div>
      ${theme.strategic_question ? `<div class="theme-question">${theme.strategic_question}</div>` : ''}
      ${theme.executive_sponsor_type ? `<div class="theme-sponsor">${theme.executive_sponsor_type}</div>` : ''}
      <div class="theme-progress">
        <div class="theme-progress-bar"><div class="theme-progress-fill" id="tpf-${theme.theme_id}" style="width:0%"></div></div>
        <div class="theme-progress-text" id="tpt-${theme.theme_id}">0 / 0</div>
      </div>
    `;
    section.appendChild(header);

    themeTipCounts[theme.theme_id] = 0;
    themeScoredCounts[theme.theme_id] = 0;

    // Value chains within theme
    const chainIds = theme.value_chains || [];
    chainIds.forEach(cid => {
      const chain = chainMap[cid];
      if (!chain) return;

      const card = document.createElement('div');
      card.className = 'chain-card';
      card.innerHTML = `
        <div class="chain-name">${chain.name}</div>
        ${chain.narrative ? `<div class="chain-narrative">${chain.narrative}</div>` : ''}
      `;

      const tips = [];
      if (chain.trend) tips.push({ ...chain.trend, role: 'T' });
      (chain.implications || []).forEach(i => tips.push({ ...i, role: 'I' }));
      (chain.possibilities || []).forEach(p => tips.push({ ...p, role: 'P' }));

      tips.forEach(tip => {
        const ref = tip.candidate_ref;
        if (!seen.has(ref)) {
          seen.add(ref);
          totalTips++;
          themeTipCounts[theme.theme_id]++;
        }
        const row = document.createElement('div');
        row.className = 'tip-row';
        row.dataset.themeId = theme.theme_id;
        const roleClass = tip.role === 'T' ? 'role-t' : tip.role === 'I' ? 'role-i' : 'role-p';
        row.innerHTML = `
          <div class="tip-role ${roleClass}">${tip.role}</div>
          <div class="tip-info">
            <div class="tip-name">${tip.name}</div>
            <div class="tip-meta">${ref}</div>
          </div>
          <div class="br-buttons">
            ${[1,2,3,4,5].map(n =>
              `<button class="br-btn s${n}" data-ref="${ref}" data-score="${n}" data-theme="${theme.theme_id}"
                onclick="setScore('${ref}', ${n}, '${theme.theme_id}')">${n}</button>`
            ).join('')}
          </div>
        `;
        card.appendChild(row);

        if (scores[ref] !== undefined) {
          setTimeout(() => {
            const btn = row.querySelector(`[data-score="${scores[ref]}"]`);
            if (btn) btn.classList.add('selected');
          }, 0);
        }
      });

      section.appendChild(card);
    });

    container.appendChild(section);
  });

  updateProgress();
}

function setScore(ref, value, themeId) {
  const wasNew = scores[ref] === undefined;
  document.querySelectorAll(`[data-ref="${ref}"]`).forEach(b => b.classList.remove('selected'));
  document.querySelectorAll(`[data-ref="${ref}"][data-score="${value}"]`).forEach(b => b.classList.add('selected'));
  scores[ref] = value;
  if (wasNew) {
    // Increment theme scored count for the theme that "owns" this candidate
    // (first theme encountered — sync means it only counts once globally)
    themeScoredCounts[themeId] = (themeScoredCounts[themeId] || 0) + 1;
  }
  updateProgress();
}

function updateProgress() {
  const scored = Object.keys(scores).length;
  const pct = totalTips > 0 ? (scored / totalTips * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${scored} / ${totalTips} bewertet`;

  // Update per-theme progress
  themes.forEach(theme => {
    const total = themeTipCounts[theme.theme_id] || 0;
    const done = themeScoredCounts[theme.theme_id] || 0;
    const tPct = total > 0 ? (done / total * 100) : 0;
    const fill = document.getElementById(`tpf-${theme.theme_id}`);
    const text = document.getElementById(`tpt-${theme.theme_id}`);
    if (fill) fill.style.width = tPct + '%';
    if (text) text.textContent = `${done} / ${total}`;
  });
}

function submitScores() {
  const output = {
    project_id: MODEL_DATA.project_id || 'unknown',
    timestamp: new Date().toISOString(),
    scores: scores,
    total_scored: Object.keys(scores).length,
    total_candidates: totalTips
  };
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'br-scores.json';
  a.click();
}

init();
</script>
