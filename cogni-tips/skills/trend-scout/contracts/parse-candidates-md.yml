version: "1.0.0"
script:
  name: "parse-candidates-md.sh"
  path: "skills/trend-scout/scripts/parse-candidates-md.sh"
  purpose: "Parse trend-candidates.md and extract selected candidates, user proposals, and regeneration requests"
  category: "utilities"
interface:
  parameters:
    - name: "--input"
      type: "string"
      required: true
      description: "Path to trend-candidates.md file"
    - name: "--file"
      type: "string"
      required: true
      description: "Alias for --input"
    - name: "--json"
      type: "boolean"
      required: false
      description: "Output JSON format (optional flag)"
  output:
    format: "json"
    schema:
      success: "boolean"
      data: {}
      error: "string (if success=false)"
  exit_codes:
    0: "Success"
    1: "Error (file not found, parse failure)"
compatibility:
  min_bash_version: "3.2"
  dependencies: []
  environment:
    - "CLAUDE_PLUGIN_ROOT (optional for relative paths)"
changelog:
  - version: "1.0.0"
    date: "2025-12-16"
    changes: "Initial contract generation"
    breaking: false
