<!DOCTYPE html>
<html lang="__LANG__">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIPS Business Relevance Scoring — __PROJECT_NAME__</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
    --t-color: #f59e0b; --i-color: #06b6d4; --p-color: #8b5cf6;
    --high: #22c55e; --mid: #eab308; --low: #ef4444;
    --theme-bg: #0d1424;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); margin-bottom: 2rem; }
  .progress { background: var(--surface); border-radius: 8px; padding: 1rem;
    margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;
    position: sticky; top: 0; z-index: 10; border: 1px solid var(--border); }
  .progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.3s; }
  .progress-text { color: var(--muted); font-size: 0.875rem; white-space: nowrap; }

  .theme-section { margin-bottom: 2.5rem; }
  .theme-header { background: var(--theme-bg); border: 1px solid var(--accent);
    border-radius: 12px 12px 0 0; padding: 1.25rem 1.5rem;
    border-bottom: 2px solid var(--accent); }
  .theme-name { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
  .theme-question { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem;
    font-style: italic; }
  .theme-sponsor { color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; }
  .theme-progress { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
  .theme-progress-bar { flex: 1; max-width: 200px; height: 4px; background: var(--border);
    border-radius: 2px; }
  .theme-progress-fill { height: 100%; background: var(--accent); border-radius: 2px;
    transition: width 0.3s; }
  .theme-progress-text { color: var(--muted); font-size: 0.75rem; }

  .chain-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; padding: 1.5rem; border-top: none; }
  .chain-card:last-child { border-radius: 0 0 12px 12px; }
  .chain-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
  .chain-narrative { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem;
    font-style: italic; }

  .tip-row { padding: 0.75rem 0; border-top: 1px solid var(--border); }
  .tip-row-main { display: flex; align-items: center; gap: 1rem; }
  .tip-role { width: 24px; height: 24px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem;
    flex-shrink: 0; }
  .role-t { background: var(--t-color); color: #000; }
  .role-i { background: var(--i-color); color: #000; }
  .role-p { background: var(--p-color); color: #fff; }
  .tip-info { flex: 1; min-width: 0; }
  .tip-name { font-weight: 500; font-size: 0.9rem; }
  .tip-meta { color: var(--muted); font-size: 0.75rem; }

  .br-buttons { display: flex; gap: 4px; flex-shrink: 0; }
  .br-btn { width: 36px; height: 36px; border: 2px solid var(--border);
    border-radius: 8px; background: transparent; color: var(--text);
    font-weight: 600; cursor: pointer; transition: all 0.15s; font-size: 0.875rem; }
  .br-btn:hover { border-color: var(--accent); background: rgba(59,130,246,0.1); }
  .br-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
  .br-btn.s1.selected { background: var(--low); border-color: var(--low); }
  .br-btn.s2.selected { background: #f97316; border-color: #f97316; }
  .br-btn.s3.selected { background: var(--mid); border-color: var(--mid); color: #000; }
  .br-btn.s4.selected { background: #84cc16; border-color: #84cc16; color: #000; }
  .br-btn.s5.selected { background: var(--high); border-color: var(--high); color: #000; }
  .br-btn.suggested { box-shadow: 0 0 0 1px var(--accent) inset; }

  .br-suggestion { display: flex; align-items: center; gap: 0.5rem;
    margin-left: 40px; margin-top: 0.4rem; font-size: 0.78rem; color: var(--muted);
    flex-wrap: wrap; }
  .br-suggestion-badge { display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.15rem 0.55rem; border-radius: 999px;
    background: rgba(59,130,246,0.12); color: var(--accent);
    border: 1px solid rgba(59,130,246,0.35); font-weight: 600; font-size: 0.75rem;
    white-space: nowrap; }
  .br-suggestion-badge.low-confidence { background: rgba(234,179,8,0.10);
    color: var(--mid); border-color: rgba(234,179,8,0.35); }
  .br-suggestion-rationale { color: var(--muted); font-style: italic;
    line-height: 1.4; }
  .br-suggestion-overridden { color: var(--mid); font-weight: 500;
    font-style: normal; }

  .tip-rationale { margin-top: 0.5rem; }
  .tip-rationale-label { display: block; font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
    margin-bottom: 0.3rem; font-weight: 600; }
  .tip-rationale textarea { width: 100%; min-height: 2.6rem; padding: 0.5rem 0.6rem;
    background: rgba(15,23,42,0.6); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; font-family: inherit; font-size: 0.85rem;
    line-height: 1.45; resize: vertical; box-sizing: border-box; }
  .tip-rationale textarea:focus { outline: none; border-color: var(--accent);
    background: rgba(15,23,42,0.85); }
  .tip-rationale textarea::placeholder { color: var(--muted); font-style: italic; }

  .tip-details { margin-top: 0.6rem; margin-left: 40px; font-size: 0.85rem;
    color: var(--muted); }
  .tip-details summary { cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 4px;
    user-select: none; list-style: none; display: inline-flex; align-items: center;
    gap: 0.4rem; }
  .tip-details summary::-webkit-details-marker { display: none; }
  .tip-details summary::before { content: '\25B8'; font-size: 0.7rem; color: var(--muted);
    transition: transform 0.15s; display: inline-block; }
  .tip-details[open] summary::before { transform: rotate(90deg); }
  .tip-details summary:hover { color: var(--accent); }
  .tip-details-body { margin-top: 0.5rem; padding: 0.75rem 1rem;
    border-left: 2px solid var(--border); background: rgba(255,255,255,0.02);
    border-radius: 0 4px 4px 0; color: var(--text); }
  .tip-details-body p { margin-bottom: 0.6rem; line-height: 1.5; }
  .tip-details-body h4 { font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); margin-top: 0.6rem;
    margin-bottom: 0.3rem; font-weight: 600; }
  .tip-details-body h4:first-child { margin-top: 0; }
  .tip-details-body ul { padding-left: 1.25rem; margin-bottom: 0.5rem; }
  .tip-details-body ul li { margin-bottom: 0.25rem; line-height: 1.45; }
  .tip-details-body a { color: var(--accent); text-decoration: none;
    word-break: break-word; }
  .tip-details-body a:hover { text-decoration: underline; }

  .legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;
    font-size: 0.8rem; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 3px; }

  .submit-area { text-align: center; padding: 2rem 0; }
  .submit-btn { background: var(--accent); color: #fff; border: none; padding: 0.75rem 2rem;
    border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Business Relevance Scoring</h1>
<p class="subtitle">__PROJECT_NAME__ — __INDUSTRY__</p>

<div class="legend">
  <span><span class="dot" style="background:var(--t-color)"></span> T = Trend</span>
  <span><span class="dot" style="background:var(--i-color)"></span> I = Implikation</span>
  <span><span class="dot" style="background:var(--p-color)"></span> P = Möglichkeit</span>
  <span>|</span>
  <span>1 = Sehr niedrig</span>
  <span>2 = Niedrig</span>
  <span>3 = Mittel</span>
  <span>4 = Hoch</span>
  <span>5 = Missionskritisch</span>
</div>

<div class="progress">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0 bewertet</div>
</div>

<div id="themes"></div>

<div class="submit-area">
  <button class="submit-btn" id="submitBtn" onclick="submitScores()">Bewertung exportieren (JSON)</button>
</div>

<script>
const MODEL_DATA = __MODEL_DATA_PLACEHOLDER__;

const scores = {};
const rationales = {};
const suggestions = {};  // ref → {score, rationale, confidence}
let totalTips = 0;
const themeTipCounts = {};
const themeScoredCounts = {};

// Build chain lookup
const chainMap = {};
(MODEL_DATA.value_chains || []).forEach(vc => { chainMap[vc.chain_id] = vc; });

// Backward compatibility: support investment_themes, themes, or flat value_chains/paths
const themes = MODEL_DATA.investment_themes || MODEL_DATA.themes || [{ investment_theme_id: 'default', name: 'TIPS Paths',
  strategic_question: '', executive_sponsor_type: '',
  value_chains: (MODEL_DATA.value_chains || MODEL_DATA.paths || []).map(c => c.chain_id || c.path_id) }];

if (!MODEL_DATA.investment_themes && !MODEL_DATA.themes && (MODEL_DATA.value_chains || MODEL_DATA.paths)) {
  (MODEL_DATA.value_chains || MODEL_DATA.paths).forEach(vc => {
    chainMap[vc.chain_id || vc.path_id] = vc;
  });
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function renderSuggestion(tip) {
  const ref = tip.candidate_ref;
  const sug = suggestions[ref];
  if (!sug || sug.score == null) return '';
  const lowConf = sug.confidence === 'low' ? ' low-confidence' : '';
  const lowNote = sug.confidence === 'low' ? ' <span title="Niedriges Vertrauen — bitte pr&uuml;fen">(?)</span>' : '';
  const rationale = sug.rationale ? `<span class="br-suggestion-rationale">&mdash; ${esc(sug.rationale)}</span>` : '';
  return `<div class="br-suggestion" data-suggestion-for="${esc(ref)}">
    <span class="br-suggestion-badge${lowConf}">LLM-Vorschlag: ${sug.score}${lowNote}</span>
    ${rationale}
  </div>`;
}

function renderTipDetails(tip) {
  const description = tip.description;
  const rationale = tip.rationale;
  const evidence = Array.isArray(tip.evidence) ? tip.evidence.filter(Boolean) : [];
  const sources = Array.isArray(tip.sources) ? tip.sources.filter(Boolean) : [];
  const ref = tip.candidate_ref;
  const sug = suggestions[ref] || {};
  const rationalePrefill = rationales[ref] != null ? rationales[ref] : (sug.rationale || '');
  const placeholder = sug.rationale
    ? 'LLM-Vorschlag &uuml;bernehmen oder &uuml;berschreiben&hellip;'
    : 'Begr&uuml;ndung des Scores eingeben&hellip;';

  const parts = [];
  parts.push(`<div class="tip-rationale">
    <label class="tip-rationale-label" for="rat-${esc(ref)}">Begr&uuml;ndung</label>
    <textarea id="rat-${esc(ref)}" data-rationale-ref="${esc(ref)}"
      placeholder="${placeholder}"
      oninput="setRationale('${esc(ref)}', this.value)">${esc(rationalePrefill)}</textarea>
  </div>`);

  if (!description && !rationale && !evidence.length && !sources.length) {
    return `<details class="tip-details" open><summary>Details</summary><div class="tip-details-body">${parts.join('')}</div></details>`;
  }
  if (description) parts.push(`<h4>Beschreibung</h4><p>${esc(description)}</p>`);
  if (rationale)   parts.push(`<h4>Hintergrund</h4><p>${esc(rationale)}</p>`);
  if (evidence.length) {
    const items = evidence.map(e => `<li>${esc(e)}</li>`).join('');
    parts.push(`<h4>Evidenz</h4><ul>${items}</ul>`);
  }
  if (sources.length) {
    const items = sources.map(src => {
      if (typeof src === 'string') return `<li>${esc(src)}</li>`;
      const title = esc(src.title || src.url || '');
      const url = src.url ? esc(src.url) : null;
      return url
        ? `<li><a href="${url}" target="_blank" rel="noopener">${title}</a></li>`
        : `<li>${title}</li>`;
    }).join('');
    parts.push(`<h4>Quellen</h4><ul>${items}</ul>`);
  }
  return `<details class="tip-details"><summary>Details</summary><div class="tip-details-body">${parts.join('')}</div></details>`;
}

function init() {
  const container = document.getElementById('themes');
  const seen = new Set();

  themes.forEach(theme => {
    const itId = theme.investment_theme_id || theme.theme_id || 'unknown';
    const section = document.createElement('div');
    section.className = 'theme-section';
    section.id = `theme-${itId}`;

    // Theme header
    const header = document.createElement('div');
    header.className = 'theme-header';
    header.innerHTML = `
      <div class="theme-name">${theme.name}</div>
      ${theme.strategic_question ? `<div class="theme-question">${theme.strategic_question}</div>` : ''}
      ${theme.executive_sponsor_type ? `<div class="theme-sponsor">${theme.executive_sponsor_type}</div>` : ''}
      <div class="theme-progress">
        <div class="theme-progress-bar"><div class="theme-progress-fill" id="tpf-${itId}" style="width:0%"></div></div>
        <div class="theme-progress-text" id="tpt-${itId}">0 / 0</div>
      </div>
    `;
    section.appendChild(header);

    themeTipCounts[itId] = 0;
    themeScoredCounts[itId] = 0;

    // Value chains within theme
    const chainIds = theme.value_chains || [];
    chainIds.forEach(cid => {
      const chain = chainMap[cid];
      if (!chain) return;

      const card = document.createElement('div');
      card.className = 'chain-card';
      card.innerHTML = `
        <div class="chain-name">${chain.name}</div>
        ${chain.narrative ? `<div class="chain-narrative">${chain.narrative}</div>` : ''}
      `;

      const tips = [];
      if (chain.trend) tips.push({ ...chain.trend, role: 'T' });
      (chain.implications || []).forEach(i => tips.push({ ...i, role: 'I' }));
      (chain.possibilities || []).forEach(p => tips.push({ ...p, role: 'P' }));

      tips.forEach(tip => {
        const ref = tip.candidate_ref;
        if (!seen.has(ref)) {
          seen.add(ref);
          totalTips++;
          themeTipCounts[itId]++;
        }
        // Capture the LLM suggestion (if present) — first occurrence wins.
        if (!suggestions[ref] && tip.business_relevance_suggested != null) {
          suggestions[ref] = {
            score: tip.business_relevance_suggested,
            rationale: tip.business_relevance_rationale || '',
            confidence: tip.business_relevance_suggested_confidence || 'high'
          };
        }
        const sug = suggestions[ref];
        const row = document.createElement('div');
        row.className = 'tip-row';
        row.dataset.themeId = itId;
        const roleClass = tip.role === 'T' ? 'role-t' : tip.role === 'I' ? 'role-i' : 'role-p';
        row.innerHTML = `
          <div class="tip-row-main">
            <div class="tip-role ${roleClass}">${tip.role}</div>
            <div class="tip-info">
              <div class="tip-name">${esc(tip.name)}</div>
              <div class="tip-meta">${esc(ref)}</div>
            </div>
            <div class="br-buttons">
              ${[1,2,3,4,5].map(n => {
                const isSug = sug && sug.score === n ? ' suggested' : '';
                return `<button class="br-btn s${n}${isSug}" data-ref="${esc(ref)}" data-score="${n}" data-theme="${itId}"
                  onclick="setScore('${esc(ref)}', ${n}, '${itId}')">${n}</button>`;
              }).join('')}
            </div>
          </div>
          ${renderSuggestion(tip)}
          ${renderTipDetails(tip)}
        `;
        card.appendChild(row);

        if (scores[ref] !== undefined) {
          setTimeout(() => {
            const btn = row.querySelector(`[data-score="${scores[ref]}"]`);
            if (btn) btn.classList.add('selected');
          }, 0);
        }
      });

      section.appendChild(card);
    });

    container.appendChild(section);
  });

  updateProgress();
}

function setScore(ref, value, themeId) {
  const wasNew = scores[ref] === undefined;
  document.querySelectorAll(`[data-ref="${ref}"]`).forEach(b => b.classList.remove('selected'));
  document.querySelectorAll(`[data-ref="${ref}"][data-score="${value}"]`).forEach(b => b.classList.add('selected'));
  scores[ref] = value;
  if (wasNew) {
    // Increment theme scored count for the theme that "owns" this candidate
    // (first theme encountered — sync means it only counts once globally)
    themeScoredCounts[themeId] = (themeScoredCounts[themeId] || 0) + 1;
  }
  // If the user picks a different score than the LLM suggestion, surface
  // that mismatch on every suggestion line keyed to this candidate so the
  // audit trail is visible at a glance.
  const sug = suggestions[ref];
  document.querySelectorAll(`[data-suggestion-for="${ref}"]`).forEach(line => {
    let note = line.querySelector('.br-suggestion-overridden');
    if (sug && sug.score != null && value !== sug.score) {
      if (!note) {
        note = document.createElement('span');
        note.className = 'br-suggestion-overridden';
        line.appendChild(note);
      }
      note.textContent = `· übersteuert: ${value}`;
    } else if (note) {
      note.remove();
    }
  });
  updateProgress();
}

function setRationale(ref, value) {
  // Persist whatever the user types — including the empty string, so an
  // explicit clear isn't silently re-filled by the LLM draft on export.
  rationales[ref] = value;
}

function updateProgress() {
  const scored = Object.keys(scores).length;
  const pct = totalTips > 0 ? (scored / totalTips * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${scored} / ${totalTips} bewertet`;

  // Update per-theme progress
  themes.forEach(theme => {
    const tid = theme.investment_theme_id || theme.theme_id || 'unknown';
    const total = themeTipCounts[tid] || 0;
    const done = themeScoredCounts[tid] || 0;
    const tPct = total > 0 ? (done / total * 100) : 0;
    const fill = document.getElementById(`tpf-${tid}`);
    const text = document.getElementById(`tpt-${tid}`);
    if (fill) fill.style.width = tPct + '%';
    if (text) text.textContent = `${done} / ${total}`;
  });
}

function submitScores() {
  // Build rationales map: prefer the user's typed value; fall back to the
  // LLM draft only for candidates the user actually scored. Empty strings
  // are honored as explicit "no rationale" rather than being replaced.
  const exportedRationales = {};
  Object.keys(scores).forEach(ref => {
    if (rationales[ref] !== undefined) {
      if (rationales[ref] !== '') exportedRationales[ref] = rationales[ref];
    } else if (suggestions[ref] && suggestions[ref].rationale) {
      exportedRationales[ref] = suggestions[ref].rationale;
    }
  });
  const output = {
    project_id: MODEL_DATA.project_id || 'unknown',
    timestamp: new Date().toISOString(),
    scores: scores,
    rationales: exportedRationales,
    total_scored: Object.keys(scores).length,
    total_candidates: totalTips
  };
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'br-scores.json';
  a.click();
}

init();
</script>
</body>
</html>
