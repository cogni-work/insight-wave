<!doctype html><html><head><meta charset="utf-8"><title>Badges & pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.b{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px}.b .d{width:6px;height:6px;border-radius:3px}.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid #E0E0DC;color:#333}.pill.a{background:#C8E62E;border-color:#C8E62E;color:#111;font-weight:600}.head{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#6B7280;font-weight:600;margin-bottom:10px}</style></head><body>
<div class="head">Status badges</div>
<div class="row">
<span class="b" style="background:rgba(46,125,50,.1);color:#2E7D32"><span class="d" style="background:#2E7D32"></span>Active</span>
<span class="b" style="background:rgba(229,161,0,.12);color:#9a6d00"><span class="d" style="background:#E5A100"></span>Warning</span>
<span class="b" style="background:rgba(211,47,47,.1);color:#D32F2F"><span class="d" style="background:#D32F2F"></span>Error</span>
<span class="b" style="background:rgba(21,101,192,.1);color:#1565C0"><span class="d" style="background:#1565C0"></span>Info</span>
<span class="b" style="background:#111;color:#C8E62E"><span class="d" style="background:#C8E62E"></span>New</span>
</div>
<div class="head">Filter pills</div>
<div class="row">
<span class="pill a">All</span>
<span class="pill">Consulting</span>
<span class="pill">Sales</span>
<span class="pill">Marketing</span>
<span class="pill">Research</span>
</div>
</body></html>
