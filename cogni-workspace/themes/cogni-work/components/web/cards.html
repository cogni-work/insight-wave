<!doctype html><html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#FAFAF8;font-family:var(--font-sans)}.g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}.c{background:#fff;border:1px solid #E0E0DC;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06)}.c.sel{border:2px solid #C8E62E;padding:19px;box-shadow:0 0 0 3px rgba(200,230,46,.15), 0 1px 3px rgba(0,0,0,.04)}h3{margin:0;font-size:17px;font-weight:700;letter-spacing:-.01em}p{margin:10px 0 14px;font-size:13px;color:#6B7280;line-height:1.55}.foot{border-top:1px solid #E0E0DC;padding-top:10px;display:flex;justify-content:space-between;align-items:baseline}.metric{font-family:var(--font-mono);font-size:18px;font-weight:700;color:#C8E62E}.sub{font-size:10px;color:#6B7280;text-transform:uppercase;letter-spacing:.08em}.chk{color:#C8E62E;font-size:18px;float:right}</style></head><body>
<div class="g">
<div class="c"><h3>Firmitas</h3><p>Dark structural anchors give the design stability.</p><div class="foot"><span class="metric">98%</span><span class="sub">Solidity</span></div></div>
<div class="c sel"><h3>Utilitas <span class="chk">✓</span></h3><p>High contrast for maximum readability and function.</p><div class="foot"><span class="metric">4.5:1</span><span class="sub">Contrast</span></div></div>
<div class="c"><h3>Venustas</h3><p>Chartreuse as signature — bold, memorable, unmistakable.</p><div class="foot"><span class="metric">#C8E62E</span><span class="sub">Accent</span></div></div>
</div>
</body></html>
