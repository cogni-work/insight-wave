<!doctype html><html><head><meta charset="utf-8"><title>KPI tiles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#FAFAF8;font-family:var(--font-sans)}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.k{background:#fff;border:1px solid #E0E0DC;border-radius:10px;padding:18px 18px 14px}.lab{font-size:11px;font-weight:500;color:#6B7280;text-transform:uppercase;letter-spacing:.06em}.val{font-size:28px;font-weight:700;letter-spacing:-.02em;margin-top:6px}.ch{font-family:var(--font-mono);font-size:12px;font-weight:600;margin-top:6px}</style></head><body>
<div class="g">
<div class="k"><div class="lab">Revenue</div><div class="val">€128K</div><div class="ch" style="color:#2E7D32">+18%</div></div>
<div class="k"><div class="lab">Clients</div><div class="val">47</div><div class="ch" style="color:#2E7D32">+6</div></div>
<div class="k"><div class="lab">NPS</div><div class="val">72</div><div class="ch" style="color:#D32F2F">−3</div></div>
<div class="k"><div class="lab">Projects</div><div class="val">12</div><div class="ch" style="color:#6B7280">3 active</div></div>
</div>
</body></html>
