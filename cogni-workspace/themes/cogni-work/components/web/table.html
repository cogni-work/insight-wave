<!doctype html><html><head><meta charset="utf-8"><title>Table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#111;font-family:var(--font-sans);color:#fff}table{width:100%;border-collapse:collapse;font-size:13px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}thead tr{background:rgba(255,255,255,.04)}th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#C8E62E;font-family:var(--font-mono);border-bottom:1px solid rgba(255,255,255,.06)}td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)}.d{width:60px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);display:inline-block;vertical-align:middle;margin-right:8px}.d>i{display:block;height:100%;background:#C8E62E;border-radius:3px}.mono{font-family:var(--font-mono);font-size:12px;color:#C8E62E}.dot{width:6px;height:6px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle}</style></head><body>
<table>
<thead><tr><th>Plugin</th><th>Status</th><th>Score</th><th>Trend</th></tr></thead>
<tbody>
<tr><td>cogni-claims</td><td><span class="dot" style="background:#2E7D32"></span><span style="color:#2E7D32">Active</span></td><td><span class="d"><i style="width:94%"></i></span><span class="mono">94</span></td><td class="mono">+12%</td></tr>
<tr><td>cogni-portfolio</td><td><span class="dot" style="background:#E5A100"></span><span style="color:#E5A100">In progress</span></td><td><span class="d"><i style="width:78%"></i></span><span class="mono">78</span></td><td class="mono">+5%</td></tr>
<tr><td>cogni-trends</td><td><span class="dot" style="background:#1565C0"></span><span style="color:#6B8DBF">Planning</span></td><td><span class="d"><i style="width:62%"></i></span><span class="mono">62</span></td><td class="mono" style="color:#9CA3AF">New</td></tr>
</tbody></table>
</body></html>
